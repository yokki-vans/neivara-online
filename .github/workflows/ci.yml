name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: neivara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d neivara_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/neivara_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Audit high and critical dependency vulnerabilities
        run: npm audit --audit-level=high
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run assets:check
      - run: npm run build
      - name: Build production server container
        run: docker build --target runtime --tag neivara-server:${{ github.sha }} .
      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx > sbom.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: neivara-sbom
          path: sbom.cdx.json
          if-no-files-found: error

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate production API URL
        run: >-
          node -e 'const value=process.env.VITE_API_URL?.trim();
          if(!value) throw new Error("Repository variable VITE_API_URL is required");
          const url=new URL(value);
          if(url.protocol!=="https:") throw new Error("VITE_API_URL must use HTTPS");'
      - run: npm run build:client
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/client/dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
