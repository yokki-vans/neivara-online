name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: neivara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d neivara_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/neivara_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Audit high and critical dependency vulnerabilities
        run: npm audit --audit-level=high
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run assets:check
      - run: npm run build
      - name: Build production server container
        run: docker build --target runtime --tag neivara-server:${{ github.sha }} .
      - name: Run unified production container smoke
        run: |
          docker run --detach --name neivara-runtime-smoke \
            --add-host host.docker.internal:host-gateway \
            --publish 3001:3001 \
            --env NODE_ENV=production \
            --env STORAGE_MODE=postgres \
            --env DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:5432/neivara_test \
            --env DATABASE_SSL=false \
            --env JWT_SECRET=ci-runtime-smoke-secret-longer-than-thirty-two-characters \
            --env CLIENT_ORIGINS=http://localhost:3001 \
            --env AUTO_MIGRATE=true \
            --env LOG_LEVEL=warn \
            neivara-server:${{ github.sha }}

          curl --fail --silent --show-error \
            --retry 30 --retry-delay 1 --retry-all-errors \
            http://127.0.0.1:3001/readyz >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:3001/ \
            | grep --quiet 'Истоки Нейвары'
          curl --fail --silent --show-error http://127.0.0.1:3001/assets/models/manifest.json \
            | node -e 'let value=""; process.stdin.on("data", chunk => value += chunk); process.stdin.on("end", () => { const manifest = JSON.parse(value); if (manifest.assets?.length !== 34) process.exit(1); });'
          curl --fail --silent --show-error http://127.0.0.1:3001/v1/catalog \
            | node -e 'let value=""; process.stdin.on("data", chunk => value += chunk); process.stdin.on("end", () => { const catalog = JSON.parse(value); if (catalog.protocolVersion !== 3 || catalog.zone?.id !== "dawnmere_crossing") process.exit(1); });'
          curl --fail --silent --show-error \
            --header 'Origin: http://localhost:3001' \
            'http://127.0.0.1:3001/socket.io/?EIO=4&transport=polling' \
            | grep --quiet '^0{'
      - name: Collect unified container logs
        if: always()
        run: |
          docker logs neivara-runtime-smoke 2>&1 || true
          docker rm --force neivara-runtime-smoke >/dev/null 2>&1 || true
      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx > sbom.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: neivara-sbom
          path: sbom.cdx.json
          if-no-files-found: error
