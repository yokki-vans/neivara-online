services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: neivara
      POSTGRES_USER: neivara
      POSTGRES_PASSWORD: neivara
    ports:
      - "5432:5432"
    volumes:
      - neivara-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neivara -d neivara"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  neivara-postgres:
